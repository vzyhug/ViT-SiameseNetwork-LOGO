<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ung dung tim kiem logo trung lap Doanh nghiep</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: rgba(30, 41, 59, 0.7);
            --primary-color: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --success-color: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #1e1b4b, var(--bg-color));
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .container {
            max-width: 600px;
            width: 90%;
            margin: 40px auto;
        }

        h2 {
            text-align: center;
            font-weight: 700;
            font-size: 2.2rem;
            margin-bottom: 8px;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 40px;
        }

        .glass-panel {
            background: var(--surface-color);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 36px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transition: transform 0.3s ease;
        }

        .upload-area {
            border: 2px dashed var(--primary-color);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            background: rgba(59, 130, 246, 0.05);
        }

        .upload-area:hover {
            background: rgba(59, 130, 246, 0.12);
            border-color: #60a5fa;
            transform: translateY(-2px);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 16px;
            display: block;
        }

        input[type="file"] {
            opacity: 0;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--primary-color), #4f46e5);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 16px 28px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 24px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5);
        }

        .results-section {
            margin-top: 40px;
        }

        .results-section h3 {
            font-size: 1.25rem;
            margin-bottom: 20px;
            color: #e2e8f0;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .result-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 18px 24px;
            margin-bottom: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .result-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(8px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .logo-id {
            font-weight: 600;
            color: #f8fafc;
            font-size: 1.1rem;
        }

        .score-badge {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success-color);
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.95rem;
            border: 1px solid rgba(16, 185, 129, 0.25);
            box-shadow: 0 2px 10px rgba(16, 185, 129, 0.1);
        }

        #file-name {
            display: block;
            margin-top: 12px;
            color: #cbd5e1;
            font-size: 0.95rem;
            font-weight: 500;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-up {
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body>
    <div class="container animate-up">
        <h2>Ung dung tim kiem logo trung lap Doanh nghiep</h2>
        <div class="subtitle">Powered by ViT + Seamese Network</div>

        <div class="glass-panel">
            <form method="POST" enctype="multipart/form-data" id="upload-form">
                <div class="upload-area">
                    <span class="upload-icon">📸</span>
                    <div>Kéo thả ảnh hoặc click để tải lên</div>
                    <span id="file-name">Chưa chọn file nào</span>
                    <input type="file" name="file" id="file-input" accept="image/*" required>
                </div>
                <button type="submit" class="btn-submit" id="submit-btn">Tìm kiếm Logo</button>
            </form>
        </div>

        {% if results %}
        <div class="results-section animate-up" style="animation-delay: 0.2s;">
            <h3>🚀 Kết quả độ tương đồng</h3>
            <div class="results-list">
                {% for res in results %}
                <div class="result-item">
                    <span class="logo-id">{{ res.id }}</span>
                    <span class="score-badge">{{ "%.2f"|format(res.score) }}%</span>
                </div>
                {% endfor %}
            </div>
        </div>
        {% endif %}
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const fileName = document.getElementById('file-name');
        const submitBtn = document.getElementById('submit-btn');

        fileInput.addEventListener('change', function(e) {
            if (this.files && this.files[0]) {
                fileName.textContent = this.files[0].name;
                fileName.style.color = '#60a5fa';
            } else {
                fileName.textContent = 'Chưa chọn file nào';
                fileName.style.color = '#cbd5e1';
            }
        });

        document.getElementById('upload-form').addEventListener('submit', function() {
            submitBtn.innerHTML = '<span style="display:inline-block; opacity: 0.8;">Đang xử lý...</span>';
            submitBtn.style.cursor = 'wait';
            submitBtn.style.pointerEvents = 'none';
        });
    </script>
</body>
</html>
